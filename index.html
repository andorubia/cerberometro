<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cerberometro - Monitor de ruido</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #000000;
      color: #ffffff;
    }

    .tarjeta {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #pantalla-inicio, #pantalla-juego {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #pantalla-juego {
      display: none;
    }

    .contenedor-cerbero {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .contenedor-cerbero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: none;
      border-radius: 0;
      box-shadow: none;
      display: block;
    }

    /* Bloque contenedor centrado horizontalmente y un poco más arriba */
    .texto-inicio {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: max-content;
      max-width: none;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      white-space: nowrap;
    }

    .texto-inicio h2 {
      font-size: 50px;
      margin-bottom: 16px;
      color: #ffffff;
    }

    .texto-inicio p {
      font-size: 28px;
      line-height: 1.5;
      margin-bottom: 12px;
      color: #ffffff;
    }

    /* Botón colocado directamente debajo del texto */
    .btn-play {
      font-family: inherit;
      margin-top: 24px;
      padding: 16px 36px;
      font-size: 20px;
      font-weight: bold;
      color: #000000;
      background-color: #ffffff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(64, 238, 254, 0.4);
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-shadow: none;
    }

    .btn-play:hover {
      background-color: #ffffff;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(64, 238, 254, 0.6);
    }

    .btn-play:active {
      transform: translateY(1px);
    }

    /* --- CAJA DEL TEMPORIZADOR (ESQUINA SUPERIOR IZQUIERDA) --- */
    .caja-temporizador {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      padding: 16px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-width: 220px;
    }

    .pantalla-tiempo {
      font-size: 40px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icono-reloj {
      width: 35px;
      height: 35px;
      object-fit: contain;
    }

    .botones-temporizador {
      display: flex;
      gap: 8px;
    }

    .btn-temp {
      font-family: inherit;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-temp-fijar {
      background-color: #40EEFE;
      color: #000000;
    }

    .btn-temp-fijar:hover {
      background-color: #2bd8ea;
    }

    .btn-temp-reiniciar {
      background-color: rgba(255, 255, 255, 0.2);
      color: #ffffff;
    }

    .btn-temp-reiniciar:hover {
      background-color: rgba(255, 255, 255, 0.35);
    }

    .btn-temp:active {
      transform: scale(0.95);
    }

    /* --- MODAL DE OBJETIVO DE TIEMPO (CENTRADO EN PANTALLA) --- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 100;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-contenido {
      background: #121212;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 30px 40px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .modal-contenido h2 {
      font-size: 26px;
      color: #40EEFE;
    }

    .modal-contenido p {
      font-size: 16px;
      color: #cccccc;
      line-height: 1.4;
    }

    .grid-opciones-tiempo {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      margin: 10px 0;
    }

    .btn-opcion-tiempo {
      font-family: inherit;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-opcion-tiempo:hover {
      background: rgba(64, 238, 254, 0.2);
      border-color: #40EEFE;
    }

    .btn-opcion-tiempo.activo {
      background: #40EEFE;
      color: #000000;
      border-color: #40EEFE;
    }

    .acciones-modal {
      display: flex;
      gap: 15px;
      width: 100%;
      justify-content: center;
    }

    .btn-modal {
      font-family: inherit;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-cancelar {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
    }

    .btn-cancelar:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .btn-iniciar-modal {
      background: #40EEFE;
      color: #000000;
    }

    .btn-iniciar-modal:hover {
      background: #2bd8ea;
      box-shadow: 0 4px 15px rgba(64, 238, 254, 0.4);
    }

    /* Barra de volumen flotante en la parte inferior */
    #medidor-volumen {
      position: absolute;
      bottom: 20px;
      left: 5%;
      width: 90%;
      height: 20px;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 10;
    }

    #barra-nivel {
      width: 0%;
      height: 100%;
      background-color: #4caf50;
      transition: width 0.1s ease, background-color 0.2s;
    }
  </style>
</head>
<body>

  <div class="tarjeta">

    <div id="pantalla-inicio">
      <div class="contenedor-cerbero">
        <img src="cerbero-inicio.jpg" alt="Portada Cerbero">
      </div>

      <div class="texto-inicio">
        <h2>Cerbero está cayendo en un profundo sueño...</h2>
        <p>El guardián del Inframundo ha estado vigilando las puertas todo el día y necesita echarse una siesta.</p>
        <p>Mantengamos el silencio para no despertar a la bestia.</p>

        <button id="btn-comenzar" class="btn-play">
          ▶ Iniciar
        </button>
      </div>
    </div>

    <div id="pantalla-juego">
      <div class="caja-temporizador">
        <div class="pantalla-tiempo">
          <img src="icono-reloj.png" alt="Reloj" class="icono-reloj">
          <span id="texto-tiempo">00:00</span>
        </div>

        <div class="botones-temporizador">
          <button id="btn-fijar-objetivo" class="btn-temp btn-temp-fijar">🞋 Fijar objetivo</button>
          <button id="btn-timer-reset" class="btn-temp btn-temp-reiniciar" style="display: none;">Reiniciar</button>
        </div>
      </div>

      <div class="contenedor-cerbero">
        <img id="imagen-cerbero" src="cerbero1.jpg" alt="Cerbero durmiendo">
      </div>

      <div id="medidor-volumen">
        <div id="barra-nivel"></div>
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="modal-objetivo">
    <div class="modal-contenido">
      <h2>Fijar objetivo de tiempo</h2>
      <p>Elige cuánto tiempo deben permanecer en silencio los alumnos.</p>

      <div class="grid-opciones-tiempo">
        <button class="btn-opcion-tiempo" data-min="1">1 min</button>
        <button class="btn-opcion-tiempo" data-min="3">3 min</button>
        <button class="btn-opcion-tiempo" data-min="5">5 min</button>
        <button class="btn-opcion-tiempo" data-min="10">10 min</button>
        <button class="btn-opcion-tiempo" data-min="15">15 min</button>
        <button class="btn-opcion-tiempo" data-min="20">20 min</button>
      </div>

      <div class="acciones-modal">
        <button class="btn-modal btn-cancelar" id="btn-modal-cancelar">Cancelar</button>
        <button class="btn-modal btn-iniciar-modal" id="btn-modal-iniciar">Iniciar temporizador</button>
      </div>
    </div>
  </div>

  <script>
    const btnComenzar = document.getElementById('btn-comenzar');
    const pantallaInicio = document.getElementById('pantalla-inicio');
    const pantallaJuego = document.getElementById('pantalla-juego');
    const imgCerbero = document.getElementById('imagen-cerbero');
    const barraNivel = document.getElementById('barra-nivel');

    // Elementos del temporizador
    const textoTiempo = document.getElementById('texto-tiempo');
    const btnFijarObjetivo = document.getElementById('btn-fijar-objetivo');
    const btnTimerReset = document.getElementById('btn-timer-reset');

    // Elementos del Modal
    const modalObjetivo = document.getElementById('modal-objetivo');
    const btnModalCancelar = document.getElementById('btn-modal-cancelar');
    const btnModalIniciar = document.getElementById('btn-modal-iniciar');
    const opcionesTiempo = document.querySelectorAll('.btn-opcion-tiempo');

    let temporizadorInterval = null;
    let tiempoRestante = 0;
    let minutosSeleccionados = 0;
    let temporizadorActivo = false;

    const imagenes = {
      nivel1: 'cerbero1.jpg',
      nivel2: 'cerbero2.jpg',
      nivel3: 'cerbero3.jpg',
      nivel4: 'cerbero4.jpg'
    };

    let audioContext;
    let analyser;
    let microphone;

    btnComenzar.addEventListener('click', async () => {
      pantallaInicio.style.display = 'none';
      pantallaJuego.style.display = 'block';

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);

        analyser.fftSize = 256;
        microphone.connect(analyser);

        procesarAudio();
      } catch (err) {
        alert('Debes permitir el acceso al micrófono para activar la detección de ruido.');
      }
    });

    // --- LÓGICA DEL TEMPORIZADOR Y MODAL ---
    function formatearTiempo(segundosTotales) {
      const min = Math.floor(segundosTotales / 60);
      const seg = segundosTotales % 60;
      return `${String(min).padStart(2, '0')}:${String(seg).padStart(2, '0')}`;
    }

    // Abrir Modal
    btnFijarObjetivo.addEventListener('click', () => {
      modalObjetivo.style.display = 'flex';
    });

    // Seleccionar opción de tiempo
    opcionesTiempo.forEach(boton => {
      boton.addEventListener('click', () => {
        opcionesTiempo.forEach(b => b.classList.remove('activo'));
        boton.classList.add('activo');
        minutosSeleccionados = parseInt(boton.getAttribute('data-min'));
      });
    });

    // Cancelar modal
    btnModalCancelar.addEventListener('click', () => {
      modalObjetivo.style.display = 'none';
    });

    // Iniciar temporizador desde el modal
    btnModalIniciar.addEventListener('click', () => {
      if (minutosSeleccionados <= 0) {
        alert('Por favor, selecciona una opción de tiempo.');
        return;
      }

      tiempoRestante = minutosSeleccionados * 60;
      textoTiempo.textContent = formatearTiempo(tiempoRestante);
      modalObjetivo.style.display = 'none';

      temporizadorActivo = true;

      btnFijarObjetivo.style.display = 'none';
      btnTimerReset.style.display = 'inline-flex';

      clearInterval(temporizadorInterval);
      temporizadorInterval = setInterval(() => {
        tiempoRestante--;
        textoTiempo.textContent = formatearTiempo(tiempoRestante);

        if (tiempoRestante <= 0) {
          clearInterval(temporizadorInterval);
          alert('¡El tiempo ha terminado!');
          reiniciarTemporizador();
        }
      }, 1000);
    });

    // Reiniciar temporizador
    function reiniciarTemporizador() {
      clearInterval(temporizadorInterval);
      tiempoRestante = 0;
      minutosSeleccionados = 0;
      temporizadorActivo = false;
      
      textoTiempo.textContent = '00:00';
      imgCerbero.src = imagenes.nivel1;
      barraNivel.style.width = '0%';
      
      opcionesTiempo.forEach(b => b.classList.remove('activo'));
      btnFijarObjetivo.style.display = 'inline-flex';
      btnTimerReset.style.display = 'none';
    }

    btnTimerReset.addEventListener('click', reiniciarTemporizador);

    // --- PROCESAMIENTO DE AUDIO ---
    function procesarAudio() {
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      function actualizar() {
        if (!analyser) return;

        if (!temporizadorActivo) {
          barraNivel.style.width = '0%';
          imgCerbero.src = imagenes.nivel1;
        } else {
          analyser.getByteFrequencyData(dataArray);

          let suma = 0;
          for (let i = 0; i < dataArray.length; i++) {
            suma += dataArray[i];
          }
          let promedio = suma / dataArray.length;
          
          let volumen = Math.min(100, Math.round((promedio / 128) * 100));

          barraNivel.style.width = volumen + '%';

          if (volumen < 20) {
            imgCerbero.src = imagenes.nivel1;
            barraNivel.style.backgroundColor = '#4caf50';
          } else if (volumen < 45) {
            imgCerbero.src = imagenes.nivel2;
            barraNivel.style.backgroundColor = '#ffeb3b';
          } else if (volumen < 70) {
            imgCerbero.src = imagenes.nivel3;
            barraNivel.style.backgroundColor = '#ff9800';
          } else {
            imgCerbero.src = imagenes.nivel4;
            barraNivel.style.backgroundColor = '#f44336';
          }
        }

        requestAnimationFrame(actualizar);
      }

      actualizar();
    }
  </script>
</body>
</html>
