<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cerberometro - Monitor de ruido</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #000000;
      color: #ffffff;
    }

    .tarjeta {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #pantalla-inicio, #pantalla-juego {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #pantalla-juego {
      display: none;
    }

    .contenedor-cerbero {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .contenedor-cerbero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: none;
      border-radius: 0;
      box-shadow: none;
      display: block;
    }

    /* Botón flotante para la pantalla de inicio */
    .btn-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      padding: 16px 36px;
      font-size: 20px;
      font-weight: bold;
      color: #000000;
      background-color: #71F0F5;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(113, 240, 245, 0.4);
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-play:hover {
      background-color: #4ee3e9;
      transform: translate(-50%, -53%);
      box-shadow: 0 6px 20px rgba(113, 240, 245, 0.6);
    }

    .btn-play:active {
      transform: translate(-50%, -49%);
    }

    /* Barra de volumen flotante en la parte inferior */
    #medidor-volumen {
      position: absolute;
      bottom: 20px;
      left: 5%;
      width: 90%;
      height: 20px;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 10;
    }

    #barra-nivel {
      width: 0%;
      height: 100%;
      background-color: #4caf50;
      transition: width 0.1s ease, background-color 0.2s;
    }
  </style>
</head>
<body>

  <div class="tarjeta">

    <div id="pantalla-inicio">
      <div class="contenedor-cerbero">
        <img src="cerbero-inicio.jpg" alt="Portada Cerbero">
      </div>

      <button id="btn-comenzar" class="btn-play">
        ▶ Iniciar monitor de ruido
      </button>
    </div>

    <div id="pantalla-juego">
      <div class="contenedor-cerbero">
        <img id="imagen-cerbero" src="cerbero1.jpg" alt="Cerbero durmiendo">
      </div>

      <div id="medidor-volumen">
        <div id="barra-nivel"></div>
      </div>
    </div>

  </div>

  <script>
    const btnComenzar = document.getElementById('btn-comenzar');
    const pantallaInicio = document.getElementById('pantalla-inicio');
    const pantallaJuego = document.getElementById('pantalla-juego');
    const imgCerbero = document.getElementById('imagen-cerbero');
    const barraNivel = document.getElementById('barra-nivel');

    const imagenes = {
      nivel1: 'cerbero1.jpg',
      nivel2: 'cerbero2.jpg',
      nivel3: 'cerbero3.jpg',
      nivel4: 'cerbero4.jpg'
    };

    let audioContext;
    let analyser;
    let microphone;

    btnComenzar.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);

        analyser.fftSize = 256;
        microphone.connect(analyser);

        pantallaInicio.style.display = 'none';
        pantallaJuego.style.display = 'block';

        procesarAudio();
      } catch (err) {
        alert('Debes permitir el acceso al micrófono para activar el Cerberómetro.');
      }
    });

    function procesarAudio() {
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      function actualizar() {
        analyser.getByteFrequencyData(dataArray);

        let suma = 0;
        for (let i = 0; i < dataArray.length; i++) {
          suma += dataArray[i];
        }
        let promedio = suma / dataArray.length;
        
        let volumen = Math.min(100, Math.round((promedio / 128) * 100));

        barraNivel.style.width = volumen + '%';

        if (volumen < 20) {
          imgCerbero.src = imagenes.nivel1;
          barraNivel.style.backgroundColor = '#4caf50';
        } else if (volumen < 45) {
          imgCerbero.src = imagenes.nivel2;
          barraNivel.style.backgroundColor = '#ffeb3b';
        } else if (volumen < 70) {
          imgCerbero.src = imagenes.nivel3;
          barraNivel.style.backgroundColor = '#ff9800';
        } else {
          imgCerbero.src = imagenes.nivel4;
          barraNivel.style.backgroundColor = '#f44336';
        }

        requestAnimationFrame(actualizar);
      }

      actualizar();
    }
  </script>
</body>
</html>
