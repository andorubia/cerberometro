<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cerberometro - Monitor de ruido</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #000000;
      color: #ffffff;
    }

    .tarjeta {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #pantalla-inicio, #pantalla-juego {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #pantalla-juego {
      display: none;
    }

    .contenedor-cerbero {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .contenedor-cerbero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: none;
      border-radius: 0;
      box-shadow: none;
      display: block;
    }

    /* Bloque contenedor centrado horizontalmente y un poco más arriba */
    .texto-inicio {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: max-content;
      max-width: none;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      white-space: nowrap;
    }

    .texto-inicio h2 {
      font-size: 50px;
      margin-bottom: 16px;
      color: #ffffff;
    }

    .texto-inicio p {
      font-size: 28px;
      line-height: 1.5;
      margin-bottom: 12px;
      color: #ffffff;
    }

    /* Botón colocado directamente debajo del texto */
    .btn-play {
      font-family: inherit;
      margin-top: 24px;
      padding: 16px 36px;
      font-size: 20px;
      font-weight: bold;
      color: #000000;
      background-color: #ffffff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(113, 240, 245, 0.4);
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-shadow: none;
    }

    .btn-play:hover {
      background-color: #ffffff;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(113, 240, 245, 0.6);
    }

    .btn-play:active {
      transform: translateY(1px);
    }

    /* --- CAJA DEL TEMPORIZADOR (ESQUINA SUPERIOR IZQUIERDA) --- */
    .caja-temporizador {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      padding: 16px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-width: 220px;
    }

    .caja-temporizador h3 {
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #71F0F5;
    }

    .pantalla-tiempo {
      font-size: 40px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #ffffff;
    }

    .botones-temporizador {
      display: flex;
      gap: 8px;
    }

    .btn-temp {
      font-family: inherit;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
