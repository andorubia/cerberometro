<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cerberometro - Monitor de ruido</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #000000;
      color: #ffffff;
    }

    .tarjeta {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #pantalla-inicio, #pantalla-juego {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #pantalla-juego {
      display: none;
    }

    .contenedor-cerbero {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .contenedor-cerbero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: none;
      border-radius: 0;
      box-shadow: none;
      display: block;
    }

    /* Bloque contenedor centrado horizontalmente y un poco más arriba */
    .texto-inicio {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: max-content;
      max-width: none;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      white-space: nowrap;
    }

    .texto-inicio h2 {
      font-size: 50px;
      margin-bottom: 16px;
      color: #ffffff;
    }

    .texto-inicio p {
      font-size: 28px;
      line-height: 1.5;
      margin-bottom: 12px;
      color: #ffffff;
    }

    /* Botón colocado directamente debajo del texto */
    .btn-play {
      font-family: inherit;
      margin-top: 24px;
      padding: 16px 36px;
      font-size: 20px;
      font-weight: bold;
      color: #000000;
      background-color: #71F0F5;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(113, 240, 245, 0.4);
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-shadow: none;
    }

    .btn-play:hover {
      background-color: #4ee3e9;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(113, 240, 245, 0.6);
    }

    .btn-play:active {
      transform: translateY(1px);
    }

    /* --- CAJA DEL TEMPORIZADOR (ESQUINA SUPERIOR IZQUIERDA) --- */
    .caja-temporizador {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      padding: 16px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-width: 200px;
    }

    .caja-temporizador h3 {
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #71F0F5;
    }

    .inputs-tiempo {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .inputs-tiempo input {
      width: 55px;
      padding: 6px;
      font-size: 18px;
      font-family: inherit;
      font-weight: bold;
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: #ffffff;
      outline: none;
    }

    .inputs-tiempo input:focus {
      border-color: #71F0F5;
    }

    .inputs-tiempo span {
      font-size: 18px;
      font-weight: bold;
    }

    .pantalla-tiempo {
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #ffffff;
    }

    .botones-temporizador {
      display: flex;
      gap: 8px;
    }

    .btn-temp {
      font-family: inherit;
      padding: 6px 14px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    .btn-temp-iniciar {
      background-color: #71F0F5;
      color: #000000;
    }

    .btn-temp-iniciar:hover {
      background-color: #4ee3e9;
    }

    .btn-temp-reiniciar {
      background-color: rgba(255, 255, 255, 0.2);
      color: #ffffff;
    }

    .btn-temp-reiniciar:hover {
      background-color: rgba(255, 255, 255, 0.35);
    }

    .btn-temp:active {
      transform: scale(0.95);
    }

    /* Barra de volumen flotante en la parte inferior */
    #medidor-volumen {
      position: absolute;
      bottom: 20px;
      left: 5%;
      width: 90%;
      height: 20px;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 10;
    }

    #barra-nivel {
      width: 0%;
      height: 100%;
      background-color: #4caf50;
      transition: width 0.1s ease, background-color 0.2s;
    }
  </style>
</head>
<body>

  <div class="tarjeta">

    <div id="pantalla-inicio">
      <div class="contenedor-cerbero">
        <img src="cerbero-inicio.jpg" alt="Portada Cerbero">
      </div>

      <div class="texto-inicio">
        <h2>Cerbero está cayendo en un profundo sueño...</h2>
        <p>El guardián del Inframundo ha estado vigilando las puertas todo el día y necesita echarse una siesta.</p>
        <p>Mantengamos el silencio para no despertar a la bestia.</p>

        <button id="btn-comenzar" class="btn-play">
          ▶ Iniciar
        </button>
      </div>
    </div>

    <div id="pantalla-juego">
      <div class="caja-temporizador">
        <h3>Temporizador</h3>
        
        <div class="inputs-tiempo" id="contenedor-inputs">
          <input type="number" id="input-minutos" placeholder="Min" min="0" max="99" value="05">
          <span>:</span>
          <input type="number" id="input-segundos" placeholder="Seg" min="0" max="59" value="00">
        </div>

        <div class="pantalla-tiempo" id="pantalla-tiempo" style="display: none;">05:00</div>

        <div class="botones-temporizador">
          <button id="btn-timer-toggle" class="btn-temp btn-temp-iniciar">Iniciar</button>
          <button id="btn-timer-reset" class="btn-temp btn-temp-reiniciar">Reiniciar</button>
        </div>
      </div>

      <div class="contenedor-cerbero">
        <img id="imagen-cerbero" src="cerbero1.jpg" alt="Cerbero durmiendo">
      </div>

      <div id="medidor-volumen">
        <div id="barra-nivel"></div>
      </div>
    </div>

  </div>

  <script>
    const btnComenzar = document.getElementById('btn-comenzar');
    const pantallaInicio = document.getElementById('pantalla-inicio');
    const pantallaJuego = document.getElementById('pantalla-juego');
    const imgCerbero = document.getElementById('imagen-cerbero');
    const barraNivel = document.getElementById('barra-nivel');

    // Elementos del temporizador
    const inputMinutos = document.getElementById('input-minutos');
    const inputSegundos = document.getElementById('input-segundos');
    const pantallaTiempo = document.getElementById('pantalla-tiempo');
    const contenedorInputs = document.getElementById('contenedor-inputs');
    const btnTimerToggle = document.getElementById('btn-timer-toggle');
    const btnTimerReset = document.getElementById('btn-timer-reset');

    let temporizadorInterval = null;
    let tiempoRestante = 0;
    let temporizadorEnEjecucion = false;

    const imagenes = {
      nivel1: 'cerbero1.jpg',
      nivel2: 'cerbero2.jpg',
      nivel3: 'cerbero3.jpg',
      nivel4: 'cerbero4.jpg'
    };

    let audioContext;
    let analyser;
    let microphone;

    btnComenzar.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);

        analyser.fftSize = 256;
        microphone.connect(analyser);

        pantallaInicio.style.display = 'none';
        pantallaJuego.style.display = 'block';

        procesarAudio();
      } catch (err) {
        alert('Debes permitir el acceso al micrófono para activar el Cerberómetro.');
      }
    });

    // --- LÓGICA DEL TEMPORIZADOR ---
    function formatearTiempo(segundosTotales) {
      const min = Math.floor(segundosTotales / 60);
      const seg = segundosTotales % 60;
      return `${String(min).padStart(2, '0')}:${String(seg).padStart(2, '0')}`;
    }

    btnTimerToggle.addEventListener('click', () => {
      if (temporizadorEnEjecucion) {
        // Pausar
        clearInterval(temporizadorInterval);
        temporizadorEnEjecucion = false;
        btnTimerToggle.textContent = 'Continuar';
      } else {
        // Iniciar o reanudar
        if (pantallaTiempo.style.display === 'none') {
          const min = parseInt(inputMinutos.value) || 0;
          const seg = parseInt(inputSegundos.value) || 0;
          tiempoRestante = min * 60 + seg;
          
          if (tiempoRestante <= 0) return;

          contenedorInputs.style.display = 'none';
          pantallaTiempo.style.display = 'block';
        }

        pantallaTiempo.textContent = formatearTiempo(tiempoRestante);
        temporizadorEnEjecucion = true;
        btnTimerToggle.textContent = 'Pausar';

        temporizadorInterval = setInterval(() => {
          tiempoRestante--;
          pantallaTiempo.textContent = formatearTiempo(tiempoRestante);

          if (tiempoRestante <= 0) {
            clearInterval(temporizadorInterval);
            temporizadorEnEjecucion = false;
            btnTimerToggle.textContent = 'Iniciar';
            alert('¡El tiempo ha terminado!');
          }
        }, 1000);
      }
    });

    btnTimerReset.addEventListener('click', () => {
      clearInterval(temporizadorInterval);
      temporizadorEnEjecucion = false;
      
      contenedorInputs.style.display = 'flex';
      pantallaTiempo.style.display = 'none';
      btnTimerToggle.textContent = 'Iniciar';
    });

    // --- PROCESAMIENTO DE AUDIO ---
    function procesarAudio() {
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      function actualizar() {
        analyser.getByteFrequencyData(dataArray);

        let suma = 0;
        for (let i = 0; i < dataArray.length; i++) {
          suma += dataArray[i];
        }
        let promedio = suma / dataArray.length;
        
        let volumen = Math.min(100, Math.round((promedio / 128) * 100));

        barraNivel.style.width = volumen + '%';

        if (volumen < 20) {
          imgCerbero.src = imagenes.nivel1;
          barraNivel.style.backgroundColor = '#4caf50';
        } else if (volumen < 45) {
          imgCerbero.src = imagenes.nivel2;
          barraNivel.style.backgroundColor = '#ffeb3b';
        } else if (volumen < 70) {
          imgCerbero.src = imagenes.nivel3;
          barraNivel.style.backgroundColor = '#ff9800';
        } else {
          imgCerbero.src = imagenes.nivel4;
          barraNivel.style.backgroundColor = '#f44336';
        }

        requestAnimationFrame(actualizar);
      }

      actualizar();
    }
  </script>
</body>
</html>
