<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cerberometro - Monitor de ruido</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #000000;
      color: #ffffff;
    }

    .tarjeta {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #pantalla-inicio, #pantalla-juego {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #pantalla-juego {
      display: none;
    }

    .contenedor-cerbero {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .contenedor-cerbero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: none;
      border-radius: 0;
      box-shadow: none;
      display: block;
    }

    /* Bloque contenedor centrado horizontalmente y un poco más arriba */
    .texto-inicio {
      position: absolute;
      top: 35%; /* <-- Cambiado de 50% a 35% para elevar la posición */
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: max-content;
      max-width: none;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      white-space: nowrap;
    }

    .texto-inicio h2 {
      font-size: 50px;
      margin-bottom: 16px;
      color: #ffffff;
    }

    .texto-inicio p {
      font-size: 28px;
      line-height: 1.5;
      margin-bottom: 12px;
      color: #ffffff;
    }

    /* Botón colocado directamente debajo del texto */
    .btn-play {
      margin-top: 24px;
      padding: 16px 36px;
      font-size: 20px;
      font-weight: bold;
      color: #000000;
      background-color: #71F0F5;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(113, 240, 245, 0.4);
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-shadow: none;
    }

    .btn-play:hover {
      background-color: #4ee3e9;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(113, 240, 245, 0.6);
    }

    .btn-play:active {
      transform: translateY(1px);
    }

    /* Barra de volumen flotante en la parte inferior */
    #medidor-volumen {
      position: absolute;
      bottom: 20px;
      left: 5%;
      width: 90%;
      height: 20px;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 10;
    }

    #barra-nivel {
      width: 0%;
      height: 100%;
      background-color: #4caf50;
      transition: width 0.1s ease, background-color 0.2s;
    }
  </style>
</head>
<body>

  <div class="tarjeta">

    <div id="pantalla-inicio">
      <div class="contenedor-cerbero">
        <img src="cerbero-inicio.jpg" alt="Portada Cerbero">
      </div>

      <div class="texto-inicio">
        <h2>Cerbero está cayendo en un profundo sueño...</h2>
        <p>El guardián del Inframundo ha estado vigilando las puertas todo el día y necesita echarse una siesta.</p>
        <p>Mantengamos el silencio para no despertar a la bestia.</p>

        <button id="btn-comenzar" class="btn-play">
          ▶ Iniciar
